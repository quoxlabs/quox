name: check

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
          cache: true
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            packages/quox/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('packages/quox/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-
      - run: deno fmt --check
      - run: deno lint
      - run: deno task build:prod
      - run: deno check
      - run: deno publish --dry-run

  publish:
    needs: check
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
          cache: true
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            packages/quox/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('packages/quox/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-
      - run: deno task build:prod
      - run: deno publish
