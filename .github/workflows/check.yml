name: check

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
          cache: true
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            packages/quox/target
          key: ${{ runner.os }}-cargo-check-${{ hashFiles('packages/quox/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-check-
      - run: deno fmt --check
      - run: deno lint
      - run: deno task build
      - run: deno check
      - run: deno publish --dry-run
