<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Inner browser (Rust → WASM)</title>
    <style>
      :root {
        color-scheme: dark light;
        --bg: #0f1217;
        --chrome: #1a1f2a;
        --border: #2d3648;
        --text: #e8ecf3;
        --muted: #8b95a8;
        --surface: #131823;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family:
          ui-sans-serif,
          system-ui,
          -apple-system,
          Segoe UI,
          Roboto,
          Helvetica,
          Arial,
          sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }
      .chrome {
        display: flex;
        gap: 0.5rem;
        align-items: center;
        padding: 0.6rem 0.75rem;
        background: var(--chrome);
        border-bottom: 1px solid var(--border);
        flex-wrap: wrap;
      }
      .chrome input[type="text"] {
        flex: 1;
        min-width: 12rem;
        padding: 0.45rem 0.6rem;
        border: 1px solid var(--border);
        border-radius: 6px;
        background: var(--surface);
        color: var(--text);
        font-size: 0.9rem;
      }
      .chrome button {
        padding: 0.45rem 0.9rem;
        border: 1px solid var(--border);
        border-radius: 6px;
        background: linear-gradient(180deg, #2a3345, #222a3a);
        color: var(--text);
        font-size: 0.85rem;
        cursor: pointer;
      }
      .chrome button.primary {
        border-color: #3d4f75;
        background: linear-gradient(180deg, #355091, #2a4080);
        color: #fff;
      }
      .chrome button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
      .layout {
        flex: 1;
        display: block;
        padding: 0.75rem;
        min-height: 0;
      }
      .canvas-shell {
        border: 1px solid var(--border);
        border-radius: 10px;
        background: #0a0c10;
        overflow: auto;
        min-height: 200px;
      }
      #page {
        display: block;
        width: 100%;
      }
      .viewport {
        padding: 1rem;
        color: var(--muted);
      }
      .error {
        color: #ff8b8b;
      }
    </style>
  </head>
  <body>
    <div class="chrome">
      <input id="url" type="text" spellcheck="false" placeholder="https://corsproxy.io/?https://…" />
      <button type="button" class="primary" id="go">Go</button>
    </div>
    <div class="layout">
      <div class="canvas-shell" id="canvas-shell">
        <canvas id="page" width="300" height="150" hidden aria-label="Rendered page"></canvas>
        <div class="viewport" id="placeholder">Loading WASM…</div>
      </div>
    </div>

    <script type="module">
      import init, { fetchAndPaint } from "./pkg/inner_browser.js";

      const canvas = document.getElementById("page");
      const shell = document.getElementById("canvas-shell");
      const placeholder = document.getElementById("placeholder");
      const urlInput = document.getElementById("url");
      const goBtn = document.getElementById("go");

      function showError(msg) {
        placeholder.hidden = false;
        placeholder.textContent = `Error: ${msg}`;
        placeholder.classList.add("error");
        canvas.hidden = true;
      }

      async function runPaint(fn) {
        goBtn.disabled = true;
        placeholder.hidden = false;
        placeholder.textContent = "Rendering…";
        canvas.hidden = true;
        try {
          const dpr = window.devicePixelRatio || 1;
          const w = Math.max(120, shell.clientWidth - 2);
          const meta = await fn(w, dpr);
          placeholder.hidden = true;
          placeholder.classList.remove("error");
          canvas.hidden = false;
          canvas.style.width = "100%";
          canvas.style.height = `${meta.height_css_px}px`;
        } catch (e) {
          showError(e instanceof Error ? e.message : String(e));
        } finally {
          goBtn.disabled = false;
        }
      }

      await init();
      placeholder.textContent = "Enter a URL and click Go.";

      goBtn.addEventListener("click", () => {
        const url = urlInput.value.trim();
        if (!url) return;
        runPaint((w, dpr) => fetchAndPaint(canvas, url, w, dpr));
      });

    </script>
  </body>
  </html>
