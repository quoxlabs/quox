[package]
name = "quox"
version = "0.0.1"
edition = "2024"

[lints.clippy]
pedantic = { level = "warn", priority = -1 }

[lib]
crate-type = ["cdylib"]
name = "quox"

[profile.dev]
# local builds for debugging

[profile.release]
opt-level = "z"
lto = true
strip = true
codegen-units = 1
panic = "abort"

# Tell wasm-pack / wasm-opt to enable all WASM features that the Rust
# compiler (≥1.93) emits: bulk-memory and nontrapping-float-to-int.
[package.metadata.wasm-pack.profile.release]
wasm-opt = ["-Oz", "--enable-bulk-memory", "--enable-nontrapping-float-to-int"]

[dependencies]
anyrender_vello = "0.8"
blitz-dom = { git = "https://github.com/DioxusLabs/blitz", rev = "4c9fb2820dc74860d3b2d972493fa4e9fa83eb48", package = "blitz-dom" }
blitz-html = { git = "https://github.com/DioxusLabs/blitz", rev = "4c9fb2820dc74860d3b2d972493fa4e9fa83eb48", package = "blitz-html" }
blitz-paint = { git = "https://github.com/DioxusLabs/blitz", rev = "4c9fb2820dc74860d3b2d972493fa4e9fa83eb48", package = "blitz-paint" }
blitz-traits = { git = "https://github.com/DioxusLabs/blitz", rev = "4c9fb2820dc74860d3b2d972493fa4e9fa83eb48", package = "blitz-traits" }
console_error_panic_hook = "0.1"
futures-intrusive = "0.5"
vello = "0.8"
wasm-bindgen = "0.2"
wasm-bindgen-futures = "0.4"
wgpu_context = "0.4"
