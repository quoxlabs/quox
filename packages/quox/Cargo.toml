[package]
name = "quox"
version = "0.0.1"
edition = "2024"

[lints.clippy]
pedantic = { level = "warn", priority = -1 }

[lib]
crate-type = ["cdylib"]
name = "quox"

[profile.dev]
# local builds for debugging

[profile.release]
opt-level = "z"
lto = true
strip = true
codegen-units = 1
panic = "abort"

[dependencies]
tokio = { version = "1.50.0", features = ["full"] }
blitz-html = "0.2.0"
blitz-dom = "0.2.4"
blitz-shell = "0.2.3"
blitz-traits = "0.2.0"
blitz-net = "0.2.1"
futures-task = "0.3.32"
futures-util = "0.3.32"
anyrender_vello = "0.6.2"
winit = "0.30.13"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
