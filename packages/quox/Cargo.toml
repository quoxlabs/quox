[package]
name = "quox"
version = "0.0.1"
edition = "2024"

[lints.clippy]
pedantic = { level = "warn", priority = -1 }

[lib]
crate-type = ["cdylib"]
name = "quox"

[profile.release]
# strip=true
# lto=true
# opt-level="z"

[dependencies]
tokio = { version = "1.49.0", features = ["full"] }
blitz-html = "0.2.0"
blitz-dom = "0.2.4"
blitz-shell = "0.2.3"
blitz-traits = "0.2.0"
blitz-net = "0.2.1"
futures-task = "0.3.31"
futures-util = "0.3.31"
anyrender_vello = "0.6.2"
winit = "0.30.12"
